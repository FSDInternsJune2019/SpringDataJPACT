spring.application.name=SpringBootDataJPA
server.port=8081
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/EmployeeDB
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.banner.location=classpath:banner.txt
management.endpoints.web.exposure.include=*
#management.endpoints.web.exposure.include=httpexchanges
management.httpexchanges.recording.enabled=true
info.app.name=Employee Rest API
info.app.version=1.0.0
info.app.description=Employee Resource Operations
management.info.env.enabled=true

#management.endpoint.health.show-details=always
#spring.boot.admin.client.enabled=true
#spring.boot.admin.client.instance.prefer-ip=true
#spring.boot.admin.client.url=http://LTIN627083.cts.com:8084


spring.sql.init.mode=always
spring.sql.init.encoding=UTF-8
